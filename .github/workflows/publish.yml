# Publishes @hypeline-io/n8n-nodes-hypeline to npm, matching the Hypeline SDK
# pipeline (@hypeline-io/sdk): releases are driven by the version in
# package.json, with NO git tags and NO NPM_TOKEN. Bump the version and push to
# main; this job publishes ONLY if that exact version is not already on npm, so a
# docs-only push or an unchanged version never re-publishes. A version bump is
# the entire release ritual.
#
# Auth is npm OIDC trusted publishing (id-token: write, no secret in this repo).
# Provenance is attached by the --provenance flag in the publish step below (which
# only works in CI, where the OIDC provider exists; a local `npm publish` omits it).
#
# ONE-TIME SETUP on npmjs.com (same as the SDK):
#   1. First publish creates the package (see "first publish" in CLAUDE.md);
#      trusted publishing cannot attach to a name that does not exist yet.
#   2. Package settings -> Trusted Publisher -> GitHub Actions:
#        Repository: Hypeline-io/n8n-nodes-hypeline
#        Workflow:   publish.yml
#   From then on every version bump publishes via OIDC with no token.

name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish-npm:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: |
          npm install -g npm@latest
          echo "node=$(node --version) npm=$(npm --version)"
      - name: Is this version new on npm?
        id: check
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if [ -n "$(npm view "@hypeline-io/n8n-nodes-hypeline@$V" version 2>/dev/null)" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "@hypeline-io/n8n-nodes-hypeline@$V already on npm; skipping."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "@hypeline-io/n8n-nodes-hypeline@$V is new; will publish."
          fi
      - name: Build and publish (OIDC, provenance, no token)
        if: steps.check.outputs.publish == 'true'
        run: |
          npm ci
          npm run build
          npm publish --provenance
